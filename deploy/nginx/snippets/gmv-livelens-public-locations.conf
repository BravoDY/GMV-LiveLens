location = /favicon.ico {
    limit_except GET { deny all; }
    proxy_pass http://gmv_livelens_frp;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}

location = /api/dashboard-cache/refresh {
    return 403;
}

location / {
    return 403;
}
