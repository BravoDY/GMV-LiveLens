# Enable this after ICP filing is complete and the Let's Encrypt certificate
# exists for descente.cloud and www.descente.cloud.
#
# The IP address keeps working over plain HTTP. Domain traffic redirects to HTTPS.

upstream gmv_livelens_frp {
    server 127.0.0.1:18100;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 124.223.70.233 _;

    include /etc/nginx/snippets/gmv-livelens-public-locations.conf;
}

server {
    listen 80;
    listen [::]:80;
    server_name descente.cloud www.descente.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name descente.cloud www.descente.cloud;

    ssl_certificate /etc/letsencrypt/live/descente.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/descente.cloud/privkey.pem;

    include /etc/nginx/snippets/gmv-livelens-public-locations.conf;
}
