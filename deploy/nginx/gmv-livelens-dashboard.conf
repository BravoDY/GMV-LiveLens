# Backward-compatible entrypoint. This project is Windows-only, so the Ubuntu
# server should proxy to the local Windows app through FRP instead of running
# FastAPI/Edge itself. For the pre-ICP HTTP setup this file is intentionally the
# same shape as gmv-livelens-frp-http.conf.

upstream gmv_livelens_frp {
    server 127.0.0.1:18100;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 124.223.70.233 descente.cloud www.descente.cloud _;

    include /etc/nginx/snippets/gmv-livelens-public-locations.conf;
}
