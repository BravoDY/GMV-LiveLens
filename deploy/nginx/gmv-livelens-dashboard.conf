upstream gmv_livelens_app {
    server 127.0.0.1:8100;
}

server {
    listen 80;
    listen [::]:80;
    server_name descente.cloud www.descente.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name descente.cloud www.descente.cloud;

    ssl_certificate /etc/letsencrypt/live/descente.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/descente.cloud/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location = / {
        return 302 /dashboard;
    }

    location = /dashboard {
        limit_except GET { deny all; }
        proxy_pass http://gmv_livelens_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        limit_except GET { deny all; }
        proxy_pass http://gmv_livelens_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/dashboard {
        limit_except GET { deny all; }
        proxy_pass http://gmv_livelens_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/dashboard-datasets {
        limit_except GET { deny all; }
        proxy_pass http://gmv_livelens_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/health {
        limit_except GET { deny all; }
        proxy_pass http://gmv_livelens_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /favicon.ico {
        limit_except GET { deny all; }
        proxy_pass http://gmv_livelens_app;
        proxy_set_header Host $host;
    }

    location = /api/dashboard-cache/refresh {
        return 403;
    }

    location / {
        return 403;
    }
}
